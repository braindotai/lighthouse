services:
  hemmelig:
    image: hemmeligapp/hemmelig:v7
    container_name: hemmelig
    restart: unless-stopped
    volumes:
      - ./data/database:/app/database
      - ./data/uploads:/app/uploads
    environment:
      - DATABASE_URL=file:/app/database/hemmelig.db
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${DOMAIN}
      - NODE_ENV=production
      - HEMMELIG_BASE_URL=${DOMAIN}
    ports:
      - '3050:3000'
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:3000/api/health/ready',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - uptime-kuma-external
    labels:
      kuma.hemmelig-group.group.name: "Hemmelig"
      kuma.hemmelig_http.http.name: "Hemmelig - HTTP"
      kuma.hemmelig_http.http.url: "http://hemmelig:3000/api/health/ready"
      kuma.hemmelig_http.http.parent_name: "hemmelig-group"
      kuma.hemmelig_docker.docker.name: "Hemmelig - Container"
      kuma.hemmelig_docker.docker.docker_container: "hemmelig"
      kuma.hemmelig_docker.docker.docker_host: "1"
      kuma.hemmelig_docker.docker.parent_name: "hemmelig-group"

networks:
  uptime-kuma-external:
    external: true
