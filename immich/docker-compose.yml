name: immich

services:

  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    volumes:
      - ${UPLOAD_LOCATION}:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    ports:
      - "2283:2283"
    depends_on:
      - immich-redis
      - immich-postgres
    restart: always
    healthcheck:
      disable: false
    devices:
      - /dev/dri:/dev/dri
    networks:
      - default
      - uptime-kuma-external
    labels:
      kuma.immich-group.group.name: "Immich"
      kuma.immich_http.http.name: "Immich - HTTP"
      kuma.immich_http.http.url: "http://immich_server:2283"
      kuma.immich_http.http.parent_name: "immich-group"
      kuma.immich_server_docker.docker.name: "Immich - Container"
      kuma.immich_server_docker.docker.docker_container: "immich_server"
      kuma.immich_server_docker.docker.parent_name: "immich-group"
      kuma.immich_server_docker.docker.docker_host: "1"

  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    volumes:
      - ${MODEL_CACHE_LOCATION}:/cache
    env_file:
      - .env
    restart: always
    healthcheck:
      disable: false
    networks:
      - default
      - uptime-kuma-external
    labels:
      kuma.immich_ml_tcp.port.name: "Immich ML - TCP"
      kuma.immich_ml_tcp.port.hostname: "immich_machine_learning"
      kuma.immich_ml_tcp.port.port: "3003"
      kuma.immich_ml_tcp.port.parent_name: "immich-group"
      kuma.immich_ml_docker.docker.name: "Immich ML - Container"
      kuma.immich_ml_docker.docker.docker_container: "immich_machine_learning"
      kuma.immich_ml_docker.docker.parent_name: "immich-group"
      kuma.immich_ml_docker.docker.docker_host: "1"

  immich-redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:9@sha256:8436e10bc65c94886a91d4415b6a6dfa9cb5a306fb3b996e5bb67cd2b4854193
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always
    networks:
      - default
      - uptime-kuma-external
    labels:
      kuma.immich_redis_tcp.port.name: "Immich Redis - TCP"
      kuma.immich_redis_tcp.port.hostname: "immich_redis"
      kuma.immich_redis_tcp.port.port: "6379"
      kuma.immich_redis_tcp.port.parent_name: "immich-group"
      kuma.immich_redis_docker.docker.name: "Immich Redis - Container"
      kuma.immich_redis_docker.docker.docker_container: "immich_redis"
      kuma.immich_redis_docker.docker.parent_name: "immich-group"
      kuma.immich_redis_docker.docker.docker_host: "1"

  immich-postgres:
    container_name: immich_postgres
    image: docker.io/tensorchord/pgvecto-rs:pg14-v0.2.0@sha256:90724186f0a3517cf6914295b5ab410db9ce23190a2d9d0b9dd6463e3fa298f0
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready --dbname='${DB_DATABASE_NAME}' --username='${DB_USERNAME}' || exit 1; Chksum=\"$$(psql --dbname='${DB_DATABASE_NAME}' --username='${DB_USERNAME}' --tuples-only --no-align --command='SELECT COALESCE(SUM(checksum_failures), 0) FROM pg_stat_database')\"; echo \"checksum failures: $$Chksum\"; [ \"$$Chksum\" = '0' ] || exit 1"]
      interval: 5m
      start_interval: 30s
      start_period: 5m
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=vectors.so"
      - "-c"
      - 'search_path="$$user", public, vectors'
      - "-c"
      - "logging_collector=on"
      - "-c"
      - "max_wal_size=2GB"
      - "-c"
      - "shared_buffers=2GB"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "maintenance_work_mem=512MB"
      - "-c"
      - "work_mem=32MB"
    restart: always
    networks:
      - default
      - uptime-kuma-external
    labels:
      kuma.immich_pg_tcp.port.name: "Immich Postgres - TCP"
      kuma.immich_pg_tcp.port.hostname: "immich_postgres"
      kuma.immich_pg_tcp.port.port: "5432"
      kuma.immich_pg_tcp.port.parent_name: "immich-group"
      kuma.immich_pg_docker.docker.name: "Immich Postgres - Container"
      kuma.immich_pg_docker.docker.docker_container: "immich_postgres"
      kuma.immich_pg_docker.docker.parent_name: "immich-group"
      kuma.immich_pg_docker.docker.docker_host: "1"

networks:
  default:
  uptime-kuma-external:
    external: true
