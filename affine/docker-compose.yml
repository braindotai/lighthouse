name: affine
services:
  affine:
    image: ghcr.io/toeverything/affine:${AFFINE_REVISION:-stable}
    container_name: affine_server
    ports:
      - '${PORT:-3010}:3010'
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      affine_migration:
        condition: service_completed_successfully
    volumes:
      - ${UPLOAD_LOCATION}:/root/.affine/storage
      - ${CONFIG_LOCATION}:/root/.affine/config
    env_file:
      - .env
    environment:
      - REDIS_SERVER_HOST=redis
      - DATABASE_URL=postgresql://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE:-affine}
      - AFFINE_INDEXER_ENABLED=false
    restart: unless-stopped
    networks:
      - default
      - uptime-kuma-external
    labels:
      kuma.affine-group.group.name: "AFFiNE"
      kuma.affine_http.http.name: "AFFiNE - HTTP"
      kuma.affine_http.http.url: "http://affine_server:3010"
      kuma.affine_http.http.parent_name: "affine-group"
      kuma.affine_docker.docker.name: "AFFiNE - Container"
      kuma.affine_docker.docker.docker_container: "affine_server"
      kuma.affine_docker.docker.docker_host: "1"
      kuma.affine_docker.docker.parent_name: "affine-group"

  affine_migration:
    image: ghcr.io/toeverything/affine:${AFFINE_REVISION:-stable}
    container_name: affine_migration_job
    volumes:
      - ${UPLOAD_LOCATION}:/root/.affine/storage
      - ${CONFIG_LOCATION}:/root/.affine/config
    command: ['sh', '-c', 'node ./scripts/self-host-predeploy.js']
    env_file:
      - .env
    environment:
      - REDIS_SERVER_HOST=redis
      - DATABASE_URL=postgresql://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE:-affine}
      - AFFINE_INDEXER_ENABLED=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # No monitoring — this is a one-shot migration job that exits on completion

  redis:
    image: redis
    container_name: affine_redis
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', 'incr', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - default
      - uptime-kuma-external
    labels:
      kuma.affine_redis_tcp.port.name: "AFFiNE Redis - TCP"
      kuma.affine_redis_tcp.port.hostname: "affine_redis"
      kuma.affine_redis_tcp.port.port: "6379"
      kuma.affine_redis_tcp.port.parent_name: "affine-group"
      kuma.affine_redis_docker.docker.name: "AFFiNE Redis - Container"
      kuma.affine_redis_docker.docker.docker_container: "affine_redis"
      kuma.affine_redis_docker.docker.docker_host: "1"
      kuma.affine_redis_docker.docker.parent_name: "affine-group"

  postgres:
    image: pgvector/pgvector:pg16
    container_name: affine_postgres
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE:-affine}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    healthcheck:
      test:
        ['CMD', 'pg_isready', '-U', "${DB_USERNAME}", '-d', "${DB_DATABASE:-affine}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - default
      - uptime-kuma-external
    labels:
      kuma.affine_pg_tcp.port.name: "AFFiNE Postgres - TCP"
      kuma.affine_pg_tcp.port.hostname: "affine_postgres"
      kuma.affine_pg_tcp.port.port: "5432"
      kuma.affine_pg_tcp.port.parent_name: "affine-group"
      kuma.affine_pg_docker.docker.name: "AFFiNE Postgres - Container"
      kuma.affine_pg_docker.docker.docker_container: "affine_postgres"
      kuma.affine_pg_docker.docker.docker_host: "1"
      kuma.affine_pg_docker.docker.parent_name: "affine-group"

networks:
  default:
  uptime-kuma-external:
    external: true
